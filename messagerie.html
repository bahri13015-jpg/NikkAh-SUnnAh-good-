<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messagerie – Nour Al Zawwaj</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ─── TOKENS ─────────────────────────────────────── */
    :root {
      --petrol:    #0F4C5C;
      --petrol-d:  #0a3543;
      --petrol-l:  #1a6070;
      --petrol-xl: #e8f2f5;
      --gold:      #C9A227;
      --gold-l:    #e0b93a;
      --gold-d:    #a8851e;
      --gold-faint:#fdf6e3;
      --white:     #FFFFFF;
      --grey:      #F5F5F5;
      --grey-mid:  #e0e0e0;
      --grey-d:    #b0bec5;
      --text:      #1a2e35;
      --text-m:    #4a6570;
      --red:       #d32f2f;
      --green:     #2e7d32;

      --ff-d: 'Cormorant Garamond', Georgia, serif;
      --ff-b: 'Jost', system-ui, sans-serif;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);

      --sidebar-w:  72px;
      --convos-w:   320px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--ff-b);
      color: var(--text);
      background: var(--petrol-d);
      display: flex;
      height: 100svh;
    }

    button { cursor: pointer; border: none; background: none; font: inherit; }
    input, textarea { font: inherit; border: none; outline: none; }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }

    /* ══════════════════════════════════════════════════
       LAYOUT ROOT
    ══════════════════════════════════════════════════ */
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) var(--convos-w) 1fr;
      width: 100%;
      height: 100svh;
      overflow: hidden;
    }

    /* ══════════════════════════════════════════════════
       LEFT NAV SIDEBAR
    ══════════════════════════════════════════════════ */
    .sidebar {
      background: var(--petrol-d);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      border-right: 1px solid rgba(255,255,255,0.05);
      gap: 8px;
      z-index: 10;
    }

    .sidebar-logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--gold-d), var(--gold));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      flex-shrink: 0;
    }
    .sidebar-logo svg { width: 22px; height: 22px; color: var(--petrol-d); }

    .nav-icon-btn {
      position: relative;
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.4);
      transition: background 0.2s, color 0.2s;
    }
    .nav-icon-btn svg { width: 20px; height: 20px; }
    .nav-icon-btn:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
    .nav-icon-btn.active {
      background: rgba(201,162,39,0.15);
      color: var(--gold);
    }
    .nav-icon-btn .badge {
      position: absolute;
      top: 6px; right: 6px;
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      border: 1.5px solid var(--petrol-d);
    }

    .sidebar-spacer { flex: 1; }

    .sidebar-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--petrol-l), var(--petrol));
      border: 2px solid rgba(201,162,39,0.4);
      display: flex; align-items: center; justify-content: center;
      color: var(--gold);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .sidebar-avatar:hover { border-color: var(--gold); }
    .sidebar-avatar svg { width: 18px; height: 18px; }

    /* ══════════════════════════════════════════════════
       CONVERSATION LIST
    ══════════════════════════════════════════════════ */
    .convos-panel {
      background: #0d3f4f;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .convos-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .convos-title {
      font-family: var(--ff-d);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 14px;
    }

    /* Search bar */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 9px 14px;
      transition: border-color 0.2s;
    }
    .search-bar:focus-within { border-color: rgba(201,162,39,0.4); }
    .search-bar svg { width: 15px; height: 15px; color: rgba(255,255,255,0.3); flex-shrink: 0; }
    .search-bar input {
      background: none;
      color: var(--white);
      font-size: 0.83rem;
      width: 100%;
    }
    .search-bar input::placeholder { color: rgba(255,255,255,0.3); }

    /* Filters */
    .convos-filters {
      display: flex;
      gap: 6px;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .filter-chip {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.45);
      transition: all 0.2s;
    }
    .filter-chip.active {
      background: rgba(201,162,39,0.15);
      border-color: rgba(201,162,39,0.4);
      color: var(--gold);
    }
    .filter-chip:hover:not(.active) { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.7); }

    /* Conversation list scroll */
    .convos-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0;
    }
    .convos-list::-webkit-scrollbar { width: 4px; }
    .convos-list::-webkit-scrollbar-track { background: transparent; }
    .convos-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    /* Single conversation item */
    .convo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }
    .convo-item:hover { background: rgba(255,255,255,0.04); }
    .convo-item.active { background: rgba(201,162,39,0.08); }
    .convo-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 8px; bottom: 8px;
      width: 3px;
      background: var(--gold);
      border-radius: 0 3px 3px 0;
    }

    .convo-avatar {
      position: relative;
      flex-shrink: 0;
    }
    .convo-avatar-img {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--petrol-l), var(--petrol));
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.6);
      font-family: var(--ff-d);
      font-size: 1.1rem;
      font-weight: 600;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .convo-item.active .convo-avatar-img { border-color: rgba(201,162,39,0.5); }
    .convo-avatar-img svg { width: 22px; height: 22px; }

    .online-dot {
      position: absolute;
      bottom: 1px; right: 1px;
      width: 10px; height: 10px;
      background: #4caf50;
      border-radius: 50%;
      border: 2px solid #0d3f4f;
    }

    .convo-body { flex: 1; min-width: 0; }
    .convo-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    .convo-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .convo-time {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.35);
      flex-shrink: 0;
      margin-left: 8px;
    }
    .convo-last {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.38);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .convo-last.unread { color: rgba(255,255,255,0.65); }

    .convo-unread-badge {
      flex-shrink: 0;
      min-width: 18px; height: 18px;
      background: var(--gold);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--petrol-d);
      padding: 0 5px;
    }

    /* ══════════════════════════════════════════════════
       MAIN CHAT AREA
    ══════════════════════════════════════════════════ */
    .chat-area {
      background: var(--grey);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ─ Chat header ─────────────────────────────────── */
    .chat-header {
      background: var(--white);
      padding: 0 28px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--grey-mid);
      flex-shrink: 0;
      box-shadow: 0 1px 8px rgba(0,0,0,0.04);
      z-index: 5;
    }
    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .chat-header-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--petrol-l), var(--petrol));
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.7);
      font-family: var(--ff-d);
      font-size: 1rem;
      font-weight: 600;
      border: 2px solid rgba(201,162,39,0.3);
      position: relative;
    }
    .chat-header-avatar svg { width: 20px; height: 20px; }
    .chat-header-avatar .online-dot { border-color: var(--white); }

    .chat-header-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--petrol);
    }
    .chat-header-status {
      font-size: 0.72rem;
      color: var(--text-m);
      margin-top: 1px;
    }
    .chat-header-status.online { color: #4caf50; }

    .chat-header-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .hdr-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-m);
      transition: background 0.2s, color 0.2s;
    }
    .hdr-btn svg { width: 18px; height: 18px; }
    .hdr-btn:hover { background: var(--grey); color: var(--petrol); }

    /* Halal reminder banner */
    .halal-banner {
      background: linear-gradient(90deg, rgba(201,162,39,0.08), rgba(201,162,39,0.04));
      border-bottom: 1px solid rgba(201,162,39,0.15);
      padding: 8px 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .halal-banner svg { width: 14px; height: 14px; color: var(--gold-d); flex-shrink: 0; }
    .halal-banner p {
      font-size: 0.72rem;
      color: var(--gold-d);
      letter-spacing: 0.04em;
    }
    .halal-banner-close {
      margin-left: auto;
      color: rgba(168,133,30,0.5);
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .halal-banner-close:hover { color: var(--gold-d); }
    .halal-banner-close svg { width: 12px; height: 12px; }

    /* ─ Messages feed ───────────────────────────────── */
    .messages-feed {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .messages-feed::-webkit-scrollbar { width: 5px; }
    .messages-feed::-webkit-scrollbar-track { background: transparent; }
    .messages-feed::-webkit-scrollbar-thumb { background: var(--grey-mid); border-radius: 4px; }

    /* Date separator */
    .msg-date-sep {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 16px 0 12px;
      color: var(--grey-d);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .msg-date-sep::before, .msg-date-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--grey-mid);
    }

    /* Bubble wrapper */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 72%;
    }
    .msg-row.me {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg-row.them { align-self: flex-start; }

    /* Small avatar in chat */
    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--petrol-l), var(--petrol));
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.65);
      font-family: var(--ff-d);
      font-size: 0.7rem;
      font-weight: 600;
      flex-shrink: 0;
      align-self: flex-end;
    }
    .msg-avatar svg { width: 13px; height: 13px; }

    /* The bubble itself */
    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.88rem;
      line-height: 1.7;
      position: relative;
      max-width: 100%;
      word-break: break-word;
    }
    /* THEM bubbles */
    .msg-row.them .bubble {
      background: var(--white);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    /* ME bubbles — signature: petrol bg + gold left border */
    .msg-row.me .bubble {
      background: var(--petrol);
      color: rgba(255,255,255,0.92);
      border-bottom-right-radius: 4px;
      border-left: 2px solid var(--gold);
      box-shadow: 0 2px 8px rgba(15,76,92,0.25);
    }

    .bubble-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
      font-size: 0.65rem;
    }
    .msg-row.them .bubble-meta { color: var(--grey-d); justify-content: flex-start; }
    .msg-row.me .bubble-meta { color: rgba(255,255,255,0.4); justify-content: flex-end; }

    /* Read receipts */
    .read-icon { display: flex; align-items: center; }
    .read-icon svg { width: 12px; height: 12px; }
    .read-icon.read svg { color: var(--gold); }
    .read-icon.sent svg { color: rgba(255,255,255,0.4); }

    /* Consecutive bubble spacing */
    .msg-row + .msg-row.me,
    .msg-row + .msg-row.them { margin-top: 2px; }
    .msg-row.me + .msg-row.them,
    .msg-row.them + .msg-row.me { margin-top: 12px; }

    /* System message */
    .msg-system {
      align-self: center;
      background: rgba(201,162,39,0.1);
      border: 1px solid rgba(201,162,39,0.2);
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 0.7rem;
      color: var(--gold-d);
      letter-spacing: 0.06em;
      margin: 8px 0;
      text-align: center;
    }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 4px 0 8px;
    }
    .typing-indicator.visible { display: flex; }
    .typing-dots {
      background: var(--white);
      border-radius: 14px;
      padding: 10px 14px;
      display: flex;
      gap: 4px;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .typing-dot {
      width: 6px; height: 6px;
      background: var(--grey-d);
      border-radius: 50%;
      animation: typingBounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingBounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-5px); }
    }

    /* ─ Composer ────────────────────────────────────── */
    .composer {
      background: var(--white);
      border-top: 1px solid var(--grey-mid);
      padding: 16px 20px;
      flex-shrink: 0;
    }
    .composer-inner {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--grey);
      border: 1.5px solid var(--grey-mid);
      border-radius: 12px;
      padding: 10px 12px;
      transition: border-color 0.25s;
    }
    .composer-inner:focus-within { border-color: rgba(15,76,92,0.4); }

    .composer-tools {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-shrink: 0;
    }
    .composer-tool {
      width: 32px; height: 32px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: var(--grey-d);
      transition: background 0.2s, color 0.2s;
    }
    .composer-tool svg { width: 17px; height: 17px; }
    .composer-tool:hover { background: var(--grey-mid); color: var(--petrol); }

    #msg-input {
      flex: 1;
      background: none;
      resize: none;
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1.5;
      max-height: 120px;
      min-height: 24px;
      padding: 4px 0;
      scrollbar-width: none;
    }
    #msg-input::-webkit-scrollbar { display: none; }
    #msg-input::placeholder { color: var(--grey-d); }

    .send-btn {
      width: 38px; height: 38px;
      border-radius: 9px;
      background: var(--petrol);
      display: flex; align-items: center; justify-content: center;
      color: var(--white);
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }
    .send-btn:hover { background: var(--petrol-l); }
    .send-btn:active { transform: scale(0.93); }
    .send-btn svg { width: 17px; height: 17px; }
    .send-btn.ready { background: var(--gold); }
    .send-btn.ready:hover { background: var(--gold-l); }
    .send-btn.ready svg { color: var(--petrol-d); }

    /* ─ Empty state ─────────────────────────────────── */
    .empty-chat {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      color: var(--text-m);
    }
    .empty-chat-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(201,162,39,0.1), rgba(201,162,39,0.04));
      border: 1px solid rgba(201,162,39,0.2);
      display: flex; align-items: center; justify-content: center;
      color: var(--gold);
    }
    .empty-chat-icon svg { width: 32px; height: 32px; }
    .empty-chat h3 {
      font-family: var(--ff-d);
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--petrol);
    }
    .empty-chat p { font-size: 0.85rem; max-width: 280px; text-align: center; line-height: 1.7; }

    /* ══════════════════════════════════════════════════
       NOTIFICATION TOASTS
    ══════════════════════════════════════════════════ */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
      pointer-events: none;
    }
    .toast {
      background: var(--petrol-d);
      border: 1px solid rgba(201,162,39,0.25);
      border-left: 3px solid var(--gold);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 300px;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      pointer-events: all;
      animation: toastIn 0.4s var(--ease) both;
    }
    .toast.exit { animation: toastOut 0.3s var(--ease) both; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(30px); }
    }

    .toast-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--petrol-l), var(--petrol));
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.7);
      flex-shrink: 0;
      font-family: var(--ff-d);
      font-size: 0.85rem;
      font-weight: 600;
    }
    .toast-body { flex: 1; min-width: 0; }
    .toast-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 2px;
    }
    .toast-preview {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast-time {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.25);
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════════════════
       PROFILE DRAWER (right panel on desktop)
    ══════════════════════════════════════════════════ */
    .profile-drawer {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 280px;
      background: var(--white);
      border-left: 1px solid var(--grey-mid);
      transform: translateX(100%);
      transition: transform 0.35s var(--ease);
      z-index: 20;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .profile-drawer.open { transform: translateX(0); }

    .drawer-header {
      background: var(--petrol);
      padding: 28px 24px 24px;
      text-align: center;
      position: relative;
    }
    .drawer-close {
      position: absolute;
      top: 14px; right: 14px;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.7);
      transition: background 0.2s;
    }
    .drawer-close:hover { background: rgba(255,255,255,0.2); }
    .drawer-close svg { width: 14px; height: 14px; }

    .drawer-avatar-lg {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--petrol-l), var(--petrol-d));
      border: 3px solid rgba(201,162,39,0.5);
      margin: 0 auto 12px;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.6);
      font-family: var(--ff-d);
      font-size: 1.8rem;
      font-weight: 600;
    }
    .drawer-name {
      font-family: var(--ff-d);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--white);
    }
    .drawer-age-loc {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    .drawer-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
    .drawer-section { margin-bottom: 20px; }
    .drawer-section-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--grey-d);
      margin-bottom: 8px;
    }
    .drawer-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .drawer-tag {
      padding: 3px 10px;
      background: var(--grey);
      border: 1px solid var(--grey-mid);
      border-radius: 2px;
      font-size: 0.73rem;
      color: var(--text-m);
    }
    .compat-bar-wrap { margin-top: 4px; }
    .compat-bar-top {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
    }
    .compat-bar-label { font-size: 0.78rem; color: var(--text-m); }
    .compat-bar-val { font-family: var(--ff-d); font-size: 1.1rem; font-weight: 700; color: var(--gold-d); }
    .compat-bar-track {
      height: 4px; background: var(--grey-mid); border-radius: 4px; overflow: hidden;
    }
    .compat-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-d), var(--gold-l));
      border-radius: 4px;
    }

    .drawer-action-btn {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    .drawer-action-btn svg { width: 15px; height: 15px; }
    .drawer-action-primary {
      background: var(--petrol);
      color: var(--white);
    }
    .drawer-action-primary:hover { background: var(--petrol-l); }
    .drawer-action-ghost {
      background: none;
      border: 1px solid var(--grey-mid);
      color: var(--text-m);
    }
    .drawer-action-ghost:hover { border-color: var(--grey-d); color: var(--text); }
    .drawer-action-danger {
      background: none;
      border: 1px solid rgba(211,47,47,0.3);
      color: var(--red);
    }
    .drawer-action-danger:hover { background: rgba(211,47,47,0.05); }

    /* ══════════════════════════════════════════════════
       MOBILE RESPONSIVE
    ══════════════════════════════════════════════════ */
    @media (max-width: 900px) {
      .app { grid-template-columns: var(--sidebar-w) 1fr; }
      .convos-panel {
        position: fixed;
        left: var(--sidebar-w); top: 0; bottom: 0;
        width: var(--convos-w);
        transform: translateX(-100%);
        transition: transform 0.35s var(--ease);
        z-index: 30;
      }
      .convos-panel.mobile-open { transform: translateX(0); }
    }
    @media (max-width: 600px) {
      :root { --sidebar-w: 0px; }
      .sidebar { display: none; }
      .app { grid-template-columns: 1fr; }
      .convos-panel {
        left: 0;
        width: 100%;
        transform: translateX(-100%);
      }
      .convos-panel.mobile-open { transform: translateX(0); }
      .chat-header { padding: 0 16px; }
      .messages-feed { padding: 20px 16px 12px; }
      .composer { padding: 12px 16px; }
    }

    /* Overlay for mobile panel */
    .panel-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 29;
    }
    .panel-overlay.visible { display: block; }

    /* ─── Scrollbar width (global) ──────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .typing-dot { animation: none; }
      .toast { animation: none; }
    }

    /* ─── Connection status bar ──────────────────────── */
    .conn-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--gold);
      z-index: 999;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease, opacity 0.3s;
    }
    .conn-bar.loading { transform: scaleX(0.7); opacity: 1; }
    .conn-bar.done    { transform: scaleX(1); opacity: 0; transition: transform 0.15s, opacity 0.5s 0.3s; }
  </style>
</head>

<script>
/* ────────────────────────────────────────────────
   SUPABASE CONFIGURATION
   Replace the two constants below with your own
   Supabase project URL and anon key.
   All realtime subscriptions, auth and DB calls
   use the supabase client created here.
──────────────────────────────────────────────── */
const SUPABASE_URL  = 'https://YOUR_PROJECT.supabase.co';
const SUPABASE_ANON = 'YOUR_ANON_KEY';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

/* ───── DB SCHEMA (run in Supabase SQL editor) ───
  -- Profiles (extend your existing table or create)
  create table profiles (
    id          uuid primary key references auth.users,
    username    text not null,
    age         int,
    city        text,
    tags        text[],
    compat_pct  int default 0,
    is_online   boolean default false,
    last_seen   timestamptz default now()
  );

  -- Conversations (one row per pair)
  create table conversations (
    id          uuid primary key default gen_random_uuid(),
    user_a      uuid references profiles(id),
    user_b      uuid references profiles(id),
    last_msg    text,
    last_at     timestamptz default now(),
    unread_a    int default 0,
    unread_b    int default 0
  );

  -- Messages
  create table messages (
    id             uuid primary key default gen_random_uuid(),
    conversation_id uuid references conversations(id) on delete cascade,
    sender_id      uuid references profiles(id),
    content        text not null,
    created_at     timestamptz default now(),
    read_at        timestamptz
  );

  -- RLS: enable and add policies for auth.uid()
  alter table conversations enable row level security;
  alter table messages      enable row level security;
  create policy "Users see own convos" on conversations
    for select using (auth.uid() = user_a or auth.uid() = user_b);
  create policy "Users insert own messages" on messages
    for insert with check (auth.uid() = sender_id);
  create policy "Users see messages in own convos" on messages
    for select using (
      exists (
        select 1 from conversations c
        where c.id = conversation_id
          and (c.user_a = auth.uid() or c.user_b = auth.uid())
      )
    );
──────────────────────────────────────────────── */

/* ────────────────────────────────────────────────
   STATE
──────────────────────────────────────────────── */
let currentUserId      = null;   // set after auth
let activeConvoId      = null;
let activeOtherUser    = null;
let realtimeSub        = null;
let allConvos          = [];
let activeFilter       = 'all';

/* ────────────────────────────────────────────────
   DEMO DATA (used when Supabase is not configured)
   Allows the UI to be fully previewed offline.
──────────────────────────────────────────────── */

const DEMO_ME = { id: 'me', username: 'Vous' };

const DEMO_CONVOS = [

    last_msg: 'Assalamu alaikum, comment allez-vous ?',

  },
  {
    id: 'c4',
    other: { id: 'u4', username: 'Nour A.', age: 28, city: 'Toulouse', tags: ['Pratiquante','Médecin'], compat_pct: 91, is_online: false },
    last_msg: 'Qu\'Allah vous facilite la recherche.',
    last_at: new Date(Date.now() - 2 * 24 * 3600000),
    unread: 0,
  },
];

const DEMO_MESSAGES = {
  c1: [
    { id: 'm1', sender_id: 'u1', content: 'Assalamu alaikum wa rahmatullahi wa barakatuhu.', created_at: new Date(Date.now() - 30 * 60000), read_at: new Date() },
    { id: 'm2', sender_id: 'me', content: 'Wa alaikum assalam wa rahmatullah. Alhamdulillah, je vais bien. Jazakallah khayran pour votre message.', created_at: new Date(Date.now() - 28 * 60000), read_at: new Date() },

};

/* ────────────────────────────────────────────────
   UTILITY HELPERS
──────────────────────────────────────────────── */
function fmtTime(date) {
  if (!date) return '';
  const d = new Date(date);
  const now = new Date();
  const diffH = (now - d) / 3600000;
  if (diffH < 24) return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  if (diffH < 48) return 'Hier';
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
}

function fmtDateSep(date) {
  const d = new Date(date);
  const now = new Date();
  const diffD = Math.floor((now - d) / 86400000);
  if (diffD === 0) return "Aujourd'hui";
  if (diffD === 1) return "Hier";
  return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
}

function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

/* ────────────────────────────────────────────────
   TOAST NOTIFICATIONS
──────────────────────────────────────────────── */
function showToast({ name, preview, initials: ini }) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <div class="toast-avatar">${ini || '?'}</div>
    <div class="toast-body">
      <div class="toast-name">${name}</div>
      <div class="toast-preview">${preview}</div>
    </div>
    <div class="toast-time">maintenant</div>
  `;
  container.appendChild(toast);
  toast.addEventListener('click', () => removeToast(toast));
  setTimeout(() => removeToast(toast), 5000);
}

function removeToast(toast) {
  toast.classList.add('exit');
  toast.addEventListener('animationend', () => toast.remove());
}

/* ────────────────────────────────────────────────
   PROGRESS BAR
──────────────────────────────────────────────── */
function progressBar(state) {
  const bar = document.getElementById('conn-bar');
  bar.className = 'conn-bar ' + state;
}

/* ────────────────────────────────────────────────
   RENDER CONVERSATION LIST
──────────────────────────────────────────────── */
function renderConvos(convos) {
  const list = document.getElementById('convos-list');
  const search = document.getElementById('search-input').value.toLowerCase();

  let filtered = convos.filter(c => {
    if (search && !c.other.username.toLowerCase().includes(search)) return false;
    if (activeFilter === 'unread' && c.unread === 0) return false;
    if (activeFilter === 'online' && !c.other.is_online) return false;
    return true;
  });

  list.innerHTML = '';

  if (filtered.length === 0) {
    list.innerHTML = `<div style="padding:32px 20px; text-align:center; color:rgba(255,255,255,0.3); font-size:0.82rem;">Aucune conversation trouvée</div>`;
    return;
  }

  filtered.forEach(convo => {
    const item = document.createElement('div');
    item.className = 'convo-item' + (convo.id === activeConvoId ? ' active' : '');
    item.dataset.id = convo.id;
    item.innerHTML = `
      <div class="convo-avatar">
        <div class="convo-avatar-img">${initials(convo.other.username)}</div>
        ${convo.other.is_online ? '<span class="online-dot"></span>' : ''}
      </div>
      <div class="convo-body">
        <div class="convo-top">
          <span class="convo-name">${convo.other.username}</span>
          <span class="convo-time">${fmtTime(convo.last_at)}</span>
        </div>
        <div class="convo-last ${convo.unread > 0 ? 'unread' : ''}">${convo.last_msg || 'Aucun message'}</div>
      </div>
      ${convo.unread > 0 ? `<div class="convo-unread-badge">${convo.unread}</div>` : ''}
    `;
    item.addEventListener('click', () => openConversation(convo));
    list.appendChild(item);
  });

  // Update global badge
  const totalUnread = convos.reduce((s, c) => s + (c.unread || 0), 0);
  const badge = document.getElementById('global-badge');
  badge.style.display = totalUnread > 0 ? 'block' : 'none';
}

/* ────────────────────────────────────────────────
   OPEN CONVERSATION
──────────────────────────────────────────────── */
async function openConversation(convo) {
  activeConvoId   = convo.id;
  activeOtherUser = convo.other;

  // Update header
  document.getElementById('chat-hdr-avatar').textContent = initials(convo.other.username);
  document.getElementById('chat-hdr-name').textContent   = convo.other.username;
  const statusEl = document.getElementById('chat-hdr-status');
  statusEl.textContent = convo.other.is_online ? 'En ligne' : 'Hors ligne';
  statusEl.className   = 'chat-header-status' + (convo.other.is_online ? ' online' : '');

  // Show chat, hide empty
  document.getElementById('empty-chat').style.display  = 'none';
  const activeChat = document.getElementById('active-chat');
  activeChat.style.display = 'flex';

  // Reset unread
  convo.unread = 0;
  renderConvos(allConvos);

  // Mobile: show chat
  if (window.innerWidth < 900) {
    document.getElementById('convos-panel').classList.remove('mobile-open');
    document.getElementById('panel-overlay').classList.remove('visible');
    document.getElementById('back-btn').style.display = 'flex';
  }

  // Load messages
  await loadMessages(convo.id);

  // Subscribe realtime
  subscribeToMessages(convo.id);
}

/* ────────────────────────────────────────────────
   LOAD MESSAGES
──────────────────────────────────────────────── */
async function loadMessages(convoId) {
  const feed = document.getElementById('messages-feed');
  feed.innerHTML = '';
  progressBar('loading');

  let msgs = [];

  if (DEMO_MODE) {
    msgs = DEMO_MESSAGES[convoId] || [];
    await new Promise(r => setTimeout(r, 300));
  } else {
    const { data, error } = await db
      .from('messages')
      .select('*')
      .eq('conversation_id', convoId)
      .order('created_at', { ascending: true });
    if (!error) msgs = data;
  }

  progressBar('done');
  renderMessages(msgs);
}

/* ────────────────────────────────────────────────
   RENDER MESSAGES
──────────────────────────────────────────────── */
function renderMessages(msgs) {
  const feed = document.getElementById('messages-feed');
  if (!msgs || msgs.length === 0) {
    feed.innerHTML = `
      <div class="msg-system">Début de la conversation · Restez courtois et pudiques</div>
    `;
    return;
  }

  let lastDate = null;
  let lastSender = null;

  msgs.forEach((msg, i) => {
    const isMe = (msg.sender_id === 'me' || msg.sender_id === currentUserId);
    const msgDate = new Date(msg.created_at).toDateString();

    // Date separator
    if (msgDate !== lastDate) {
      const sep = document.createElement('div');
      sep.className = 'msg-date-sep';
      sep.textContent = fmtDateSep(msg.created_at);
      feed.appendChild(sep);
      lastDate = msgDate;
      lastSender = null;
    }

    const row = document.createElement('div');
    row.className = `msg-row ${isMe ? 'me' : 'them'}`;

    const showAvatar = !isMe && lastSender !== msg.sender_id;

    if (!isMe) {
      row.innerHTML = `
        ${showAvatar ? `<div class="msg-avatar">${initials(activeOtherUser?.username)}</div>` : `<div style="width:28px;flex-shrink:0"></div>`}
        <div>
          <div class="bubble">${escapeHtml(msg.content)}</div>
          <div class="bubble-meta">
            <span>${fmtTime(msg.created_at)}</span>
          </div>
        </div>
      `;
    } else {
      const readClass = msg.read_at ? 'read' : 'sent';
      const readIcon  = msg.read_at
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 12 5 16 12 7"/><polyline points="8 12 12 16 19 7"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="5 12 10 17 20 7"/></svg>`;
      row.innerHTML = `
        <div>
          <div class="bubble">${escapeHtml(msg.content)}</div>
          <div class="bubble-meta">
            <span>${fmtTime(msg.created_at)}</span>
            <span class="read-icon ${readClass}">${readIcon}</span>
          </div>
        </div>
      `;
    }

    feed.appendChild(row);
    lastSender = msg.sender_id;
  });

  // Scroll to bottom
  feed.scrollTop = feed.scrollHeight;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}

/* ────────────────────────────────────────────────
   SEND MESSAGE
──────────────────────────────────────────────── */
async function sendMessage() {
  const input   = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !activeConvoId) return;

  input.value = '';
  autoResize(input);
  updateSendBtn();

  const tempMsg = {
    id:         'temp-' + Date.now(),
    sender_id:  currentUserId || 'me',
    content,
    created_at: new Date(),
    read_at:    null,
  };

  // Optimistic render
  appendMessage(tempMsg);

  if (DEMO_MODE) {
    // Update demo state
    const convo = allConvos.find(c => c.id === activeConvoId);
    if (convo) { convo.last_msg = content; convo.last_at = new Date(); }
    renderConvos(allConvos);

    // Simulate typing + reply after delay
    setTimeout(() => showTyping(), 1500);
    setTimeout(() => {
      hideTyping();
      const reply = {
        id: 'demo-reply-' + Date.now(),
        sender_id: activeOtherUser?.id || 'u1',
        content: getDemoReply(),
        created_at: new Date(),
        read_at: null,
      };
      appendMessage(reply);
      if (convo) { convo.last_msg = reply.content; convo.last_at = new Date(); convo.unread = 0; }
      renderConvos(allConvos);
    }, 3500);
    return;
  }

  const { error } = await db.from('messages').insert({
    conversation_id: activeConvoId,
    sender_id: currentUserId,
    content,
  });

  if (error) {
    console.error('Send error:', error);
    showToast({ name: 'Erreur', preview: 'Message non envoyé. Réessayez.', initials: '!' });
  }

  // Update conversation last_msg
  await db.from('conversations')
    .update({ last_msg: content, last_at: new Date().toISOString() })
    .eq('id', activeConvoId);
}

/* ────────────────────────────────────────────────
   APPEND SINGLE MESSAGE (optimistic / realtime)
──────────────────────────────────────────────── */
function appendMessage(msg) {
  const feed    = document.getElementById('messages-feed');
  const isMe    = (msg.sender_id === 'me' || msg.sender_id === currentUserId);
  const row     = document.createElement('div');
  row.className = `msg-row ${isMe ? 'me' : 'them'}`;

  if (!isMe) {
    row.innerHTML = `
      <div class="msg-avatar">${initials(activeOtherUser?.username)}</div>
      <div>
        <div class="bubble">${escapeHtml(msg.content)}</div>
        <div class="bubble-meta"><span>${fmtTime(msg.created_at)}</span></div>
      </div>
    `;
  } else {
    row.innerHTML = `
      <div>
        <div class="bubble">${escapeHtml(msg.content)}</div>
        <div class="bubble-meta">
          <span>${fmtTime(msg.created_at)}</span>
          <span class="read-icon sent">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="5 12 10 17 20 7"/></svg>
          </span>
        </div>
      </div>
    `;
  }

  feed.appendChild(row);
  feed.scrollTop = feed.scrollHeight;
}

/* ────────────────────────────────────────────────
   TYPING INDICATOR
──────────────────────────────────────────────── */
function showTyping() {
  const feed = document.getElementById('messages-feed');
  let ti = document.querySelector('.typing-indicator');
  if (!ti) {
    ti = document.createElement('div');
    ti.className = 'typing-indicator';
    ti.innerHTML = `
      <div class="msg-avatar">${initials(activeOtherUser?.username)}</div>
      <div class="typing-dots">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    feed.appendChild(ti);
  }
  ti.classList.add('visible');
  feed.scrollTop = feed.scrollHeight;
}
function hideTyping() {
  const ti = document.querySelector('.typing-indicator');
  if (ti) ti.classList.remove('visible');
}

const DEMO_REPLIES = [
  'Jazakallah khayran pour votre réponse.',
  'Insha Allah, qu\'Allah nous facilite.',
  'Alhamdulillah, je partage votre avis.',
  'Barak Allahu fikoum.',
  'Pourriez-vous m\'en dire un peu plus ?',
];
let demoReplyIdx = 0;
function getDemoReply() {
  return DEMO_REPLIES[demoReplyIdx++ % DEMO_REPLIES.length];
}

/* ────────────────────────────────────────────────
   SUPABASE REALTIME SUBSCRIPTION
──────────────────────────────────────────────── */
function subscribeToMessages(convoId) {
  if (realtimeSub) { db.removeChannel(realtimeSub); realtimeSub = null; }
  if (DEMO_MODE) return;

  realtimeSub = db
    .channel('messages:' + convoId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'messages',
      filter: `conversation_id=eq.${convoId}`,
    }, (payload) => {
      const msg = payload.new;
      // Don't re-render own messages (already shown optimistically)
      if (msg.sender_id !== currentUserId) {
        appendMessage(msg);
        // Update convo list
        const convo = allConvos.find(c => c.id === convoId);
        if (convo) { convo.last_msg = msg.content; convo.last_at = msg.created_at; }
        renderConvos(allConvos);
      }
    })
    .subscribe();
}

/* ────────────────────────────────────────────────
   LOAD CONVERSATIONS
──────────────────────────────────────────────── */
async function loadConversations() {
  progressBar('loading');
  if (DEMO_MODE) {
    allConvos = DEMO_CONVOS;
    await new Promise(r => setTimeout(r, 200));
    progressBar('done');
    renderConvos(allConvos);

    // Simulate incoming notification after 4s
    setTimeout(() => {
      showToast({ name: 'Amina K.', preview: 'Assalamu alaikum, comment allez-vous ?', initials: 'AK' });
      const c = allConvos.find(x => x.id === 'c1');
      if (c && c.id !== activeConvoId) { c.unread++; renderConvos(allConvos); }
    }, 4000);
    return;
  }

  const { data: { user } } = await db.auth.getUser();
  if (!user) { progressBar('done'); return; }
  currentUserId = user.id;

  const { data, error } = await db
    .from('conversations')
    .select(`
      id, last_msg, last_at, unread_a, unread_b,
      profile_a:user_a ( id, username, age, city, tags, compat_pct, is_online ),
      profile_b:user_b ( id, username, age, city, tags, compat_pct, is_online )
    `)
    .or(`user_a.eq.${currentUserId},user_b.eq.${currentUserId}`)
    .order('last_at', { ascending: false });

  progressBar('done');

  if (error) { console.error(error); return; }

  allConvos = (data || []).map(c => {
    const isA  = c.profile_a.id === currentUserId;
    const other  = isA ? c.profile_b : c.profile_a;
    const unread = isA ? c.unread_a  : c.unread_b;
    return { id: c.id, other, last_msg: c.last_msg, last_at: c.last_at, unread };
  });

  renderConvos(allConvos);

  // Global realtime for new messages notification
  db.channel('global-notif')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'messages',
    }, (payload) => {
      const msg = payload.new;
      if (msg.sender_id === currentUserId) return;
      const convo = allConvos.find(c => c.id === msg.conversation_id);
      if (!convo) return;
      if (msg.conversation_id !== activeConvoId) {
        convo.unread++;
        renderConvos(allConvos);
        showToast({ name: convo.other.username, preview: msg.content, initials: initials(convo.other.username) });
      }
    })
    .subscribe();
}

/* ────────────────────────────────────────────────
   PROFILE DRAWER
──────────────────────────────────────────────── */
function openDrawer() {
  if (!activeOtherUser) return;
  const u = activeOtherUser;
  document.getElementById('drawer-avatar').textContent = initials(u.username);
  document.getElementById('drawer-name').textContent   = u.username;
  document.getElementById('drawer-loc').textContent    = [u.age ? u.age + ' ans' : '', u.city].filter(Boolean).join(' · ');
  document.getElementById('drawer-compat').textContent = (u.compat_pct || '—') + '%';
  document.getElementById('drawer-compat-bar').style.width = (u.compat_pct || 0) + '%';
  const tagsEl = document.getElementById('drawer-tags');
  tagsEl.innerHTML = '';
  (u.tags || []).forEach(t => {
    const span = document.createElement('span');
    span.className = 'drawer-tag';
    span.textContent = t;
    tagsEl.appendChild(span);
  });
  document.getElementById('profile-drawer').classList.add('open');
}
function closeDrawer() { document.getElementById('profile-drawer').classList.remove('open'); }

/* ────────────────────────────────────────────────
   SEND BUTTON STATE
──────────────────────────────────────────────── */
function updateSendBtn() {
  const btn = document.getElementById('send-btn');
  const hasText = document.getElementById('msg-input').value.trim().length > 0;
  btn.classList.toggle('ready', hasText);
}

/* ────────────────────────────────────────────────
   EVENT LISTENERS
──────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {

  loadConversations();

  // Composer
  const msgInput = document.getElementById('msg-input');
  msgInput.addEventListener('input', () => { autoResize(msgInput); updateSendBtn(); });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('send-btn').addEventListener('click', sendMessage);

  // Profile drawer
  document.getElementById('profile-btn').addEventListener('click', openDrawer);
  document.getElementById('drawer-close').addEventListener('click', closeDrawer);

  // Halal banner close
  document.getElementById('banner-close').addEventListener('click', () => {
    document.getElementById('halal-banner').style.display = 'none';
  });

  // Back button (mobile)
  document.getElementById('back-btn').addEventListener('click', () => {
    document.getElementById('empty-chat').style.display = 'flex';
    document.getElementById('active-chat').style.display = 'none';
    document.getElementById('convos-panel').classList.add('mobile-open');
    document.getElementById('panel-overlay').classList.add('visible');
  });

  // Filter chips
  document.querySelectorAll('.filter-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderConvos(allConvos);
    });
  });

  // Search
  document.getElementById('search-input').addEventListener('input', () => renderConvos(allConvos));

  // Mobile: toggle convos panel
  document.getElementById('toggle-convos-btn').addEventListener('click', () => {
    if (window.innerWidth < 900) {
      const panel   = document.getElementById('convos-panel');
      const overlay = document.getElementById('panel-overlay');
      panel.classList.toggle('mobile-open');
      overlay.classList.toggle('visible', panel.classList.contains('mobile-open'));
    }
  });

  // Overlay click → close panel
  document.getElementById('panel-overlay').addEventListener('click', () => {
    document.getElementById('convos-panel').classList.remove('mobile-open');
    document.getElementById('panel-overlay').classList.remove('visible');
  });

  // Report btn header
  document.getElementById('report-btn').addEventListener('click', () => {
    showToast({ name: 'Signalement', preview: 'Votre signalement a été transmis à notre équipe.', initials: '!' });
  });
  document.getElementById('report-btn-drawer').addEventListener('click', () => {
    closeDrawer();
    showToast({ name: 'Signalement', preview: 'Votre signalement a été transmis à notre équipe.', initials: '!' });
  });

  // Notification demo button
  document.getElementById('notif-btn').addEventListener('click', () => {
    const demos = [
      { name: 'Fatima S.', preview: 'Wa alaikum assalam, alhamdulillah !', initials: 'FS' },
      { name: 'Khadija M.', preview: 'Insha Allah je vous répondrai bientôt.', initials: 'KM' },
      { name: 'Nour Al Zawwaj', preview: 'Votre profil a été consulté 3 fois aujourd\'hui.', initials: 'NZ' },
    ];
    const pick = demos[Math.floor(Math.random() * demos.length)];
    showToast(pick);
  });
});
