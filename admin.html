<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; background:#0d1117; color:white; padding:20px; }
    .card { background:#161b22; padding:12px; margin:10px 0; border-radius:8px; }
    button { margin-right:8px; padding:6px 10px; cursor:pointer; }
  </style>
</head>

<body>

<h1>Admin Panel</h1>
<div id="list"></div>

<script>
  // ⚠️ TON SUPABASE (OK côté front)
  const supabaseUrl = "https://hozxklpzfzmrswzbamye.supabase.co";
  const supabaseKey = "sb_publishable_MurlKY4clW48vcHYcuXCMw_WrbuhDIA";

  const client = supabase.createClient(supabaseUrl, supabaseKey);

  async function loadUsers() {
    const { data, error } = await client
      .from("profils")
      .select("*")
      .eq("profil_en_revue", true);

    if (error) {
      document.getElementById("list").innerHTML = error.message;
      return;
    }

    document.getElementById("list").innerHTML = data.map(u => `
      <div class="card">
        <b>${u.prenom || "Sans nom"}</b><br/>
        ${u.ville || ""} - ${u.pays || ""}<br/>
        Statut: ${u.profil_valide ? "VALIDÉ" : "EN ATTENTE"}<br/><br/>

        <button onclick="validate('${u.utilisateur_id}')">Valider</button>
        <button onclick="ban('${u.utilisateur_id}')">Bannir</button>
        <button onclick="remove('${u.utilisateur_id}')">Supprimer</button>
      </div>
    `).join("");
  }

  async function validate(id) {
    await client.from("profils")
      .update({ profil_valide: true, profil_en_revue: false })
      .eq("utilisateur_id", id);

    loadUsers();
  }

  async function ban(id) {
    await client.from("utilisateurs")
      .update({ admin_valide: false })
      .eq("id", id);

    loadUsers();
  }

  async function remove(id) {
    await client.from("profils")
      .delete()
      .eq("utilisateur_id", id);

    await client.from("utilisateurs")
      .delete()
      .eq("id", id);

    loadUsers();
  }

  loadUsers();
</script>

</body>
</html>
