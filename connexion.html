<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connexion | Nour Al Zawwaj</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="background"></div>

<div class="container">

<div class="left">

<div class="logo">

<h1>Nour Al Zawwaj</h1>

<p>Trouvez votre moitié dans le respect de la Sunnah.</p>

</div>

</div>

<div class="right">

<div class="card">

<h2>Connexion</h2>

<p class="subtitle">

Connectez-vous à votre espace membre.

</p>

<div class="message" id="message"></div>

<form id="loginForm">

<div class="field">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Votre adresse email"
required>

</div>

<div class="field">

<label>Mot de passe</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Votre mot de passe"
required>

<button
type="button"
id="togglePassword">

👁

</button>

</div>

</div>

<button
type="submit"
class="btn">

Se connecter

</button>

</form>

<div class="links">

<a href="#" id="forgotPassword">

Mot de passe oublié ?

</a>

<a href="inscription.html">

Créer un compte

</a>

</div>

</div>

</div>

</div>

<script src="auth.js"></script>

</body>

</html>
