<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Admin Panel Supabase</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0d1117;
      color: white;
      padding: 20px;
    }

    h1 { margin-bottom: 20px; }

    .stats {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .box {
      background: #161b22;
      padding: 12px;
      border-radius: 8px;
      min-width: 120px;
    }

    .card {
      background: #161b22;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #30363d;
    }

    button {
      margin-right: 8px;
      padding: 6px 10px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
    }

    .ok { background: green; color: white; }
    .del { background: red; color: white; }
  </style>
</head>

<body>

<h1>ADMIN PANEL</h1>

<div class="stats">
  <div class="box">Total: <span id="total">0</span></div>
  <div class="box">En attente: <span id="pending">0</span></div>
  <div class="box">Validés: <span id="valid">0</span></div>
</div>

<div id="list">Chargement...</div>

<script>
  // 🔥 TON SUPABASE
  const supabaseUrl = "https://hozxklpzfzmrswzbamye.supabase.co";
  const supabaseKey = "sb_publishable_MurlKY4clW48vcHYcuXCMw_WrbuhDIA";

  const client = supabase.createClient(supabaseUrl, supabaseKey);

  async function load() {

    const { data, error } = await client
      .from("profils")
      .select("*");

    if (error) {
      document.getElementById("list").innerHTML = error.message;
      return;
    }

    document.getElementById("total").textContent = data.length;
    document.getElementById("pending").textContent = data.filter(u => !u.profil_valide).length;
    document.getElementById("valid").textContent = data.filter(u => u.profil_valide).length;

    document.getElementById("list").innerHTML = data.map(u => `
      <div class="card">

        <b>${u.prenom || "Sans nom"}</b><br>
        ${u.ville || ""} - ${u.pays || ""}<br>
        Statut: ${u.profil_valide ? "VALIDÉ" : "EN ATTENTE"}<br><br>

        <button class="ok" onclick="validate('${u.utilisateur_id}')">
          Valider
        </button>

        <button class="del" onclick="removeUser('${u.utilisateur_id}')">
          Supprimer
        </button>

      </div>
    `).join("");
  }

  async function validate(id) {
    await client
      .from("profils")
      .update({
        profil_valide: true,
        profil_en_revue: false
      })
      .eq("utilisateur_id", id);

    load();
  }

  async function removeUser(id) {
    await client.from("profils")
      .delete()
      .eq("utilisateur_id", id);

    await client.from("utilisateurs")
      .delete()
      .eq("id", id);

    load();
  }

  load();
</script>

</body>
</html>
